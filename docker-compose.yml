services:
  inference-api:
    build: .
    environment:
      SPACY_N_PROCESS: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload  # override dockerfile CMD with --reload for dev
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    command: mlflow ui --backend-store-uri ./mlruns --host 0.0.0.0 --port 5000
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
